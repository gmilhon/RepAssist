<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b0b" />
    <title>Rep Assist — Assisted Sales &amp; Service</title>
    <script>
      // Resolve and apply the theme before first paint to avoid a flash of the
      // wrong theme. Kept in sync with src/theme.ts (localStorage key + logic).
      (function () {
        try {
          var pref = localStorage.getItem("repassist.theme") || "system";
          var dark = pref === "dark" || (pref === "system" &&
            window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.setAttribute("data-theme", dark ? "dark" : "light");
        } catch (e) {
          document.documentElement.setAttribute("data-theme", "light");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
